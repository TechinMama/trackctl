name: Athena
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: 17.0
packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.0.0
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.mccoyale.athena
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    GENERATE_INFOPLIST_FILE: YES
    SENTRY_DSN: ""  # injected via CI secret (SENTRY_DSN build setting) or Xcode scheme env var locally
targets:
  Athena:
    type: application
    platform: iOS
    sources:
      - path: AthenaApp.swift
      - path: Models
      - path: Services
      - path: Theme
      - path: ViewModels
      - path: Views
      - path: Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: Sentry
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_AppEnv: "$(APP_ENV)"
        INFOPLIST_KEY_AthenaAPIBaseURL: "$(ATHENA_API_BASE_URL)"
        INFOPLIST_KEY_AthenaLiveAPIEnabled: "$(ATHENA_LIVE_API_ENABLED)"
        INFOPLIST_KEY_AthenaManagedAPISettings: "$(ATHENA_MANAGED_API_SETTINGS)"
        INFOPLIST_KEY_AthenaRequireLiveData: "$(ATHENA_REQUIRE_LIVE_DATA)"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_SentryDSN: "$(SENTRY_DSN)"
      configs:
        Debug:
          APP_ENV: debug
          ATHENA_API_BASE_URL: "https://ca-athena-dev-backend.orangetree-abd9b5a7.eastus2.azurecontainerapps.io"
          ATHENA_LIVE_API_ENABLED: YES
          ATHENA_MANAGED_API_SETTINGS: YES
          ATHENA_REQUIRE_LIVE_DATA: YES
        Release:
          APP_ENV: production
          ATHENA_API_BASE_URL: ""
          ATHENA_LIVE_API_ENABLED: YES
          ATHENA_MANAGED_API_SETTINGS: YES
          ATHENA_REQUIRE_LIVE_DATA: YES

schemes:
  Athena:
    build:
      targets:
        Athena: all
    run:
      config: Debug
    archive:
      config: Release
