name: Release to TestFlight

on:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: "Upload IPA to TestFlight"
        required: true
        default: true
        type: boolean
      release_notes:
        description: "What's new text for this build"
        required: false
        default: "Athena release build"
        type: string
  push:
    tags:
      - "v*"

jobs:
  archive-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import signing certificate
        env:
          SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/athena.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$SIGNING_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$SIGNING_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/athena.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          xcodebuild archive \
            -project Athena.xcodeproj \
            -scheme Athena \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/Athena.xcarchive \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            CODE_SIGN_STYLE=Manual \
            SENTRY_DSN="$SENTRY_DSN" \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Athena.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist ExportOptions.plist \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Athena-${{ github.ref_name || github.sha }}
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30

      - name: Upload to TestFlight
        if: ${{ (github.event_name == 'push' || inputs.upload_to_testflight) && secrets.APPSTORE_API_KEY_ID != '' && secrets.APPSTORE_API_ISSUER_ID != '' && secrets.APPSTORE_API_PRIVATE_KEY != '' }}
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          mkdir -p $RUNNER_TEMP/private_keys
          KEY_FILE=$RUNNER_TEMP/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8
          echo "$APPSTORE_API_PRIVATE_KEY" > "$KEY_FILE"
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/export/*.ipa \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"
