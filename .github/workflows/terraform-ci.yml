name: Terraform CI

on:
  pull_request:
    paths:
      - infra/terraform/**
      - .github/workflows/terraform-ci.yml
  workflow_dispatch:
    inputs:
      enable_prod_plan:
        description: Enable prod Terraform plan
        required: false
        default: false
        type: boolean

concurrency:
  group: terraform-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    name: Terraform CI (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - dev
          - test
          - prod
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_postgres_admin_password: ${{ secrets.TF_VAR_POSTGRES_ADMIN_PASSWORD }}
      TF_BACKEND_RESOURCE_GROUP: ${{ secrets.TF_BACKEND_RESOURCE_GROUP }}
      TF_BACKEND_STORAGE_ACCOUNT: ${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}
      TF_BACKEND_CONTAINER: ${{ secrets.TF_BACKEND_CONTAINER }}

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        if: matrix.environment != 'prod' || (github.event_name == 'workflow_dispatch' && inputs.enable_prod_plan == true)
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ env.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ env.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=${{ env.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ env.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=${{ matrix.environment }}.tfstate"

      - name: Terraform validate
        if: matrix.environment != 'prod' || (github.event_name == 'workflow_dispatch' && inputs.enable_prod_plan == true)
        run: terraform validate

      - name: Azure login
        if: (matrix.environment != 'prod' || (github.event_name == 'workflow_dispatch' && inputs.enable_prod_plan == true)) && env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform plan (${{ matrix.environment }} example)
        id: plan
        if: (matrix.environment != 'prod' || (github.event_name == 'workflow_dispatch' && inputs.enable_prod_plan == true)) && env.AZURE_CLIENT_ID != '' && env.AZURE_TENANT_ID != '' && env.AZURE_SUBSCRIPTION_ID != ''
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ env.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ env.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_postgres_admin_password: ${{ env.TF_VAR_postgres_admin_password }}
        run: |
          TFVARS_FILE="envs/${{ matrix.environment }}/${{ matrix.environment }}.tfvars.example"
          if [ ! -f "$TFVARS_FILE" ]; then
            echo "Missing tfvars file: $TFVARS_FILE"
            exit 1
          fi

          terraform plan -lock=false -input=false -var-file="$TFVARS_FILE" -no-color 2>&1 | tee "plan-${{ matrix.environment }}.txt"
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post plan comment to PR
        if: (matrix.environment != 'prod' || (github.event_name == 'workflow_dispatch' && inputs.enable_prod_plan == true)) && github.event_name == 'pull_request' && env.AZURE_CLIENT_ID != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const envName = '${{ matrix.environment }}';
            const planPath = `infra/terraform/plan-${envName}.txt`;
            if (!fs.existsSync(planPath)) { return; }
            const raw = fs.readFileSync(planPath, 'utf8');
            const plan = raw.length > 60000 ? raw.slice(0, 60000) + '\n\n_...output truncated..._' : raw;
            const status = '${{ steps.plan.outputs.exitcode }}' === '0' ? '✅ success' : '⚠️ changes or errors';
            const header = `<!-- terraform-plan-${envName} -->`;
            const body = `${header}\n## Terraform Plan (${envName}) — ${status}\n\`\`\`\n${plan}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(header));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan errored
        if: (matrix.environment != 'prod' || (github.event_name == 'workflow_dispatch' && inputs.enable_prod_plan == true)) && steps.plan.outputs.exitcode == '1'
        run: exit 1

      - name: Terraform plan skipped
        if: (matrix.environment != 'prod' || (github.event_name == 'workflow_dispatch' && inputs.enable_prod_plan == true)) && (env.AZURE_CLIENT_ID == '' || env.AZURE_TENANT_ID == '' || env.AZURE_SUBSCRIPTION_ID == '')
        run: |
          echo "Skipping terraform plan until Azure OIDC is configured."
          echo "Required secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, TF_VAR_POSTGRES_ADMIN_PASSWORD"

      - name: Prod plan disabled by default
        if: matrix.environment == 'prod' && !(github.event_name == 'workflow_dispatch' && inputs.enable_prod_plan == true)
        run: |
          echo "Skipping prod Terraform CI plan by default."
          echo "Use manual dispatch with enable_prod_plan=true when ready."
