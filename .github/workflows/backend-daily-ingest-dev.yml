name: Backend Daily Ingest (Dev)

on:
  schedule:
    # Daily at 05:00 UTC.
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: backend-daily-ingest-dev
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ACR_NAME: acrathenadev
      IMAGE_NAME: athena-backend
      IMAGE_TAG: dev
      RESOURCE_GROUP: rg-athena-dev
      MANAGED_ENV: cae-athena-dev
      JOB_NAME: athena-ingest-dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Create and run ingestion job
        run: |
          ACR_USER=$(az acr credential show --name "$ACR_NAME" --query username -o tsv)
          ACR_PASS=$(az acr credential show --name "$ACR_NAME" --query "passwords[0].value" -o tsv)

          # Idempotent recreate ensures latest command + env each run.
          az containerapp job delete \
            --name "$JOB_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --yes 2>/dev/null || true

          az containerapp job create \
            --name "$JOB_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --environment "$MANAGED_ENV" \
            --trigger-type Manual \
            --replica-timeout 600 \
            --replica-retry-limit 1 \
            --image "${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${IMAGE_TAG}" \
            --registry-server "${ACR_NAME}.azurecr.io" \
            --registry-username "$ACR_USER" \
            --registry-password "$ACR_PASS" \
            --cpu 0.25 --memory 0.5Gi \
            --command "/bin/sh" \
            --args "-c" "python -m scripts.seed_athletes" \
            --secrets "database-url=${{ secrets.DATABASE_URL }}" \
            --env-vars "DATABASE_URL=secretref:database-url"

          az containerapp job start \
            --name "$JOB_NAME" \
            --resource-group "$RESOURCE_GROUP"

      - name: Wait for ingestion completion
        run: |
          for _ in $(seq 1 60); do
            STATUS=$(az containerapp job execution list \
              --name "$JOB_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query "[-1].properties.status" -o tsv 2>/dev/null || echo "Unknown")
            echo "Ingestion status: $STATUS"
            if [ "$STATUS" = "Succeeded" ]; then
              echo "Ingestion succeeded."; exit 0
            fi
            if [ "$STATUS" = "Failed" ]; then
              echo "Ingestion failed."; exit 1
            fi
            sleep 5
          done
          echo "Timed out waiting for ingestion completion."
          exit 1

      - name: Verify live data endpoint
        run: |
          URL="https://ca-athena-dev-backend.orangetree-abd9b5a7.eastus2.azurecontainerapps.io/athletes?active_only=true&runners_only=true&limit=3"
          curl -fsS "$URL" | python -c "import sys, json; obj=json.load(sys.stdin); print('athletes_count=', len(obj.get('data', [])))"
