included:
  - AthenaApp.swift
  - Models
  - Services
  - ViewModels
  - Views
  - Theme
  - Tests

excluded:
  - Athena.xcodeproj
  - backend
  - infra

disabled_rules:
  - trailing_whitespace     # formatter handles this
  - line_length             # project uses longer analytical lines

opt_in_rules:
  - force_unwrapping
  - empty_count
  - closure_spacing
  - overridden_super_call
  - implicit_optional_initialization
  - unused_optional_binding

force_cast: error
force_try: error
force_unwrapping: warning

# Project-appropriate thresholds for a rapid-build codebase
file_length:
  warning: 800
  error: 1000
  ignore_comment_only_lines: true

type_body_length:
  warning: 470
  error: 600

function_body_length:
  warning: 100
  error: 130

function_parameter_count:
  warning: 6
  error: 8

identifier_name:
  min_length:
    warning: 3
    error: 2
  excluded:
    - id
    - x
    - y
    - i
    - r
    - vm
    - a1
    - b1
